<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ambria</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%234A1111'/><text x='50' y='62' text-anchor='middle' fill='white' font-size='28' font-weight='bold' font-family='sans-serif'>A</text><circle cx='72' cy='28' r='5' fill='%23D4872C'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#fff;min-height:100dvh;overflow-x:hidden}

.pick-screen{min-height:100dvh;display:flex;flex-direction:column;max-width:440px;margin:0 auto;padding:24px 16px}
.pick-header{text-align:center;padding:32px 0 24px}
.logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#4A1111,#8B2D2D);display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin-bottom:8px;position:relative}
.logo::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:#D4872C}
.brand{font-size:13px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:600}
.pick-search{position:relative;margin-bottom:16px}
.pick-search input{width:100%;padding:14px 16px 14px 42px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;font-size:16px;outline:none;transition:border .2s}
.pick-search input:focus{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.pick-search input::placeholder{color:rgba(255,255,255,.25)}
.pick-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.3}
.pick-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pick-item{padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent}
.pick-item:active{background:rgba(255,255,255,.1);transform:scale(.98)}
.pick-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#4A1111,#8B2D2D);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.pick-name{font-size:15px;font-weight:600;color:#fff}
.pick-apps{display:flex;gap:4px;margin-top:3px}
.pick-dot{width:7px;height:7px;border-radius:50%;opacity:.7}
.pick-empty{text-align:center;padding:32px 0;color:rgba(255,255,255,.25);font-size:13px}
.pick-count{font-size:12px;color:rgba(255,255,255,.2);text-align:center;margin-bottom:12px}

.hub-screen{min-height:100dvh;padding:0 0 32px;max-width:440px;margin:0 auto}
.hub-header{padding:20px 16px 16px;display:flex;align-items:center;justify-content:space-between}
.hub-user{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#4A1111,#8B2D2D);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.hub-name{font-size:16px;font-weight:700;color:#fff}
.hub-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.logout-btn{padding:6px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:none;color:rgba(255,255,255,.35);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.logout-btn:active{background:rgba(255,255,255,.08)}

.cards{padding:0 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.card{border-radius:20px;padding:28px 20px;display:flex;flex-direction:column;align-items:flex-start;gap:12px;cursor:pointer;transition:all .2s;text-decoration:none;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
.card:active{transform:scale(.97)}
.card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;filter:blur(40px);opacity:.3}
.card-icon{font-size:28px;z-index:1}
.card-label{font-size:14px;font-weight:700;color:#fff;z-index:1;line-height:1.3}
.card-desc{font-size:11px;color:rgba(255,255,255,.4);z-index:1}

.c-ops{background:linear-gradient(135deg,#1a1a3e,#252550)}.c-ops::before{background:#6366f1}
.c-attendance{background:linear-gradient(135deg,#1a2e1a,#1f3d1f)}.c-attendance::before{background:#22c55e}
.c-shoot{background:linear-gradient(135deg,#2e1a1a,#3d1f1f)}.c-shoot::before{background:#f97316}
.c-feedback{background:linear-gradient(135deg,#1a2e2e,#1f3d3d)}.c-feedback::before{background:#06b6d4}

.footer{text-align:center;padding:32px 0 16px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.15)}
.footer span{color:#D4872C}

.admin-screen{min-height:100dvh;padding:0 0 32px;max-width:540px;margin:0 auto}
.admin-header{padding:20px 16px 16px;display:flex;align-items:center;justify-content:space-between}
.admin-title{font-size:18px;font-weight:700;color:#fff}
.admin-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.admin-list{padding:0 16px}
.admin-row{padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.admin-row:active{background:rgba(255,255,255,.1)}
.admin-row.inactive{opacity:.4}
.admin-meta{flex:1;min-width:0}
.admin-meta-name{font-size:14px;font-weight:600;color:#fff}
.admin-meta-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.admin-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.admin-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
.admin-actions{display:flex;gap:6px;flex-shrink:0}
.abtn{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:none;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.abtn:active{background:rgba(255,255,255,.08)}
.abtn-add{border-color:#6366f1;color:#818cf8;background:rgba(99,102,241,.1)}
.abtn-del{border-color:#ef4444;color:#f87171}
.admin-search{padding:0 16px;margin-bottom:12px}
.admin-search input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;font-size:15px;outline:none}
.admin-search input:focus{border-color:rgba(255,255,255,.2)}
.admin-search input::placeholder{color:rgba(255,255,255,.25)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal-box{background:#1a1a2e;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;width:100%;max-width:400px}
.modal-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.modal-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:15px;outline:none}
.modal-input:focus{border-color:rgba(255,255,255,.2)}
.modal-checks{display:flex;flex-wrap:wrap;gap:8px}
.modal-check{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s;font-size:13px;color:rgba(255,255,255,.6)}
.modal-check.checked{border-color:#6366f1;background:rgba(99,102,241,.15);color:#fff}
.modal-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.mbtn{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.mbtn-cancel{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.mbtn-save{background:#6366f1;color:#fff}
.mbtn-save:disabled{opacity:.4;cursor:default}
.mbtn:active{transform:scale(.97)}
.gear-btn{padding:6px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:none;color:rgba(255,255,255,.35);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.gear-btn:active{background:rgba(255,255,255,.08)}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://ptksdithbytzrznplfiq.supabase.co'
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0a3NkaXRoYnl0enJ6bnBsZmlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDEzNDksImV4cCI6MjA4OTMxNzM0OX0.209RbAzGEWoF_tD0jEiKwfrQRFYPucT42rlOogeQ5-k'

var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
var app = document.getElementById('app')

var APPS = {
  ops: { icon: '📦', label: 'Ambria Ops', desc: 'Inventory & Events', url: '/ambria-ops/', css: 'c-ops' },
  attendance: { icon: '📋', label: 'Attendance', desc: 'Staff tracking', url: '/ambria-attendance/', css: 'c-attendance' },
  shoot: { icon: '📸', label: 'Shoot Tracker', desc: 'Photo shoots', url: '/shoot-tracker/', css: 'c-shoot' },
  feedback: { icon: '💬', label: 'Feedback', desc: 'Guest feedback', url: '/ambria-feedback/', css: 'c-feedback' },
}

var APP_COLORS = { ops: '#6366f1', attendance: '#22c55e', shoot: '#f97316', feedback: '#06b6d4' }

var state = { user: null, allUsers: [], search: '', loading: true }

function init() {
  var saved = null
  try { saved = JSON.parse(localStorage.getItem('ambria_hub')) } catch (e) {}
  if (saved && saved.name && saved.apps) {
    state.user = saved
    state.user.is_admin = saved.is_admin || false
    renderHub()
  }
  loadUsers()
}

async function loadUsers() {
  try {
    var res = await sb.rpc('hub_users_list')
    if (res.error || !res.data) { state.allUsers = []; state.loading = false; render(); return }
    state.allUsers = res.data
    state.loading = false
    if (!state.user) renderPicker()
  } catch (e) {
    state.allUsers = []
    state.loading = false
    if (!state.user) renderPicker()
  }
}

function selectUser(u) {
  state.user = { id: u.id, name: u.name, apps: u.apps, is_admin: u.is_admin || false }
  try { localStorage.setItem('ambria_hub', JSON.stringify(state.user)) } catch (e) {}
  renderHub()
}

function logout() {
  try { localStorage.removeItem('ambria_hub') } catch (e) {}
  state.user = null
  state.search = ''
  renderPicker()
}
var adminState = { users: [], search: '', editing: null, loading: false }

async function loadAdminUsers() {
  adminState.loading = true
  renderAdmin()
  var res = await sb.rpc('hub_admin_list')
  adminState.users = res.data || []
  adminState.loading = false
  renderAdmin()
}

async function saveAdminUser(u) {
  var { error } = await sb.rpc('hub_admin_upsert', {
    p_id: u.id || 0,
    p_name: u.name,
    p_apps: u.apps,
    p_pin: u.pin || '',
    p_active: u.active !== false,
    p_is_admin: u.is_admin || false,
  })
  if (error) { alert('Save failed: ' + error.message); return }
  adminState.editing = null
  loadAdminUsers()
  loadUsers()
}

async function deleteAdminUser(id) {
  if (!confirm('Delete this user permanently?')) return
  var { error } = await sb.rpc('hub_admin_delete', { p_id: id })
  if (error) { alert('Delete failed: ' + error.message); return }
  loadAdminUsers()
  loadUsers()
}

function openEditModal(u) {
  adminState.editing = u ? JSON.parse(JSON.stringify(u)) : { id: null, name: '', apps: [], pin: '', active: true, is_admin: false }
  renderAdmin()
}

function renderAdmin() {
  var q = adminState.search.toLowerCase()
  var filtered = adminState.users.filter(function (u) {
    return !q || u.name.toLowerCase().indexOf(q) !== -1
  })

  var listHtml = ''
  if (adminState.loading) {
    listHtml = '<div class="pick-empty">Loading...</div>'
  } else {
    for (var i = 0; i < filtered.length; i++) {
      var u = filtered[i]
      var badges = ''
      for (var j = 0; j < u.apps.length; j++) {
        var color = APP_COLORS[u.apps[j]] || '#666'
        badges += '<span class="admin-badge" style="background:' + color + '22;color:' + color + '">' + u.apps[j] + '</span>'
      }
      if (u.is_admin) badges += '<span class="admin-badge" style="background:#f59e0b22;color:#f59e0b">admin</span>'
      listHtml +=
        '<div class="admin-row' + (u.active ? '' : ' inactive') + '" data-idx="' + i + '">' +
          '<div class="pick-avatar">' + u.name.charAt(0) + '</div>' +
          '<div class="admin-meta">' +
            '<div class="admin-meta-name">' + u.name + (!u.active ? ' <span style="color:#ef4444;font-size:10px">INACTIVE</span>' : '') + '</div>' +
            '<div class="admin-meta-sub">' + (u.pin || 'No PIN') + '</div>' +
            '<div class="admin-badges">' + badges + '</div>' +
          '</div>' +
          '<div class="admin-actions">' +
            '<button class="abtn admin-edit" data-idx="' + i + '">Edit</button>' +
            '<button class="abtn abtn-del admin-del" data-idx="' + i + '">✕</button>' +
          '</div>' +
        '</div>'
    }
  }

  var modalHtml = ''
  if (adminState.editing) {
    var e = adminState.editing
    var appKeys = Object.keys(APPS)
    var appChecks = ''
    for (var k = 0; k < appKeys.length; k++) {
      var key = appKeys[k]
      var isOn = e.apps.indexOf(key) !== -1
      appChecks += '<div class="modal-check' + (isOn ? ' checked' : '') + '" data-app="' + key + '">' + APPS[key].icon + ' ' + APPS[key].label + '</div>'
    }
    modalHtml =
      '<div class="modal-bg" id="modal-bg">' +
        '<div class="modal-box">' +
          '<div class="modal-title">' + (e.id ? 'Edit User' : 'Add User') + '</div>' +
          '<div class="modal-field">' +
            '<div class="modal-label">Name</div>' +
            '<input class="modal-input" id="m-name" value="' + (e.name || '') + '" placeholder="Full name">' +
          '</div>' +
          '<div class="modal-field">' +
            '<div class="modal-label">PIN (optional)</div>' +
            '<input class="modal-input" id="m-pin" value="' + (e.pin || '') + '" placeholder="4-digit PIN">' +
          '</div>' +
          '<div class="modal-field">' +
            '<div class="modal-label">Apps</div>' +
            '<div class="modal-checks" id="m-apps">' + appChecks + '</div>' +
          '</div>' +
          '<div class="modal-field">' +
            '<label class="modal-toggle" id="m-active">' +
              '<input type="checkbox"' + (e.active !== false ? ' checked' : '') + '> Active' +
            '</label>' +
          '</div>' +
          '<div class="modal-field">' +
            '<label class="modal-toggle" id="m-admin">' +
              '<input type="checkbox"' + (e.is_admin ? ' checked' : '') + '> Hub Admin' +
            '</label>' +
          '</div>' +
          '<div class="modal-btns">' +
            '<button class="mbtn mbtn-cancel" id="m-cancel">Cancel</button>' +
            '<button class="mbtn mbtn-save" id="m-save">Save</button>' +
          '</div>' +
        '</div>' +
      '</div>'
  }

  app.innerHTML =
    '<div class="admin-screen">' +
      '<div class="admin-header">' +
        '<div>' +
          '<div class="admin-title">Manage Users</div>' +
          '<div class="admin-sub">' + adminState.users.length + ' total users</div>' +
        '</div>' +
        '<div style="display:flex;gap:6px">' +
          '<button class="abtn abtn-add" id="admin-add">+ Add</button>' +
          '<button class="abtn" id="admin-back">← Back</button>' +
        '</div>' +
      '</div>' +
      '<div class="admin-search">' +
        '<input type="text" id="admin-search" placeholder="Search users..." value="' + adminState.search + '">' +
      '</div>' +
      '<div class="admin-list">' + listHtml + '</div>' +
      '<div class="footer">Ambria <span>●</span> Hub Admin</div>' +
    '</div>' +
    modalHtml

  // Wire events
  var backBtn = document.getElementById('admin-back')
  if (backBtn) backBtn.addEventListener('click', function () { renderHub() })

  var addBtn = document.getElementById('admin-add')
  if (addBtn) addBtn.addEventListener('click', function () { openEditModal(null) })

  var searchEl = document.getElementById('admin-search')
  if (searchEl) searchEl.addEventListener('input', function (ev) {
    adminState.search = ev.target.value
    renderAdmin()
    var el2 = document.getElementById('admin-search')
    if (el2) { el2.focus(); el2.setSelectionRange(adminState.search.length, adminState.search.length) }
  })

  app.querySelectorAll('.admin-edit').forEach(function (el) {
    el.addEventListener('click', function (ev) {
      ev.stopPropagation()
      openEditModal(filtered[Number(el.dataset.idx)])
    })
  })

  app.querySelectorAll('.admin-del').forEach(function (el) {
    el.addEventListener('click', function (ev) {
      ev.stopPropagation()
      deleteAdminUser(filtered[Number(el.dataset.idx)].id)
    })
  })

  // Modal events
  var modalBg = document.getElementById('modal-bg')
  if (modalBg) modalBg.addEventListener('click', function (ev) {
    if (ev.target === modalBg) { adminState.editing = null; renderAdmin() }
  })

  var cancelBtn = document.getElementById('m-cancel')
  if (cancelBtn) cancelBtn.addEventListener('click', function () { adminState.editing = null; renderAdmin() })

  app.querySelectorAll('.modal-check').forEach(function (el) {
    el.addEventListener('click', function () {
      var appKey = el.dataset.app
      var idx = adminState.editing.apps.indexOf(appKey)
      if (idx === -1) adminState.editing.apps.push(appKey)
      else adminState.editing.apps.splice(idx, 1)
      renderAdmin()
    })
  })

  var activeEl = document.getElementById('m-active')
  if (activeEl) activeEl.addEventListener('change', function () {
    adminState.editing.active = activeEl.querySelector('input').checked
  })

  var adminEl = document.getElementById('m-admin')
  if (adminEl) adminEl.addEventListener('change', function () {
    adminState.editing.is_admin = adminEl.querySelector('input').checked
  })

  var saveBtn = document.getElementById('m-save')
  if (saveBtn) saveBtn.addEventListener('click', function () {
    var nameVal = document.getElementById('m-name').value.trim()
    var pinVal = document.getElementById('m-pin').value.trim()
    if (!nameVal) { alert('Name required'); return }
    adminState.editing.name = nameVal
    adminState.editing.pin = pinVal
    saveAdminUser(adminState.editing)
  })
}

function render() {
  if (state.user) renderHub()
  else renderPicker()
}

function renderPicker() {
  var q = state.search.toLowerCase()
  var filtered = state.allUsers.filter(function (u) {
    return !q || u.name.toLowerCase().indexOf(q) !== -1
  })

  var listHtml = ''
  if (state.loading) {
    listHtml = '<div class="pick-empty">Loading...</div>'
  } else if (filtered.length === 0) {
    listHtml = '<div class="pick-empty">' + (q ? 'No match for "' + state.search + '"' : 'No users found') + '</div>'
  } else {
    for (var i = 0; i < filtered.length; i++) {
      var u = filtered[i]
      var dots = ''
      for (var j = 0; j < u.apps.length; j++) {
        var color = APP_COLORS[u.apps[j]] || '#666'
        dots += '<div class="pick-dot" style="background:' + color + '"></div>'
      }
      listHtml +=
        '<div class="pick-item" data-idx="' + i + '">' +
          '<div class="pick-avatar">' + u.name.charAt(0) + '</div>' +
          '<div>' +
            '<div class="pick-name">' + u.name + '</div>' +
            '<div class="pick-apps">' + dots + '</div>' +
          '</div>' +
        '</div>'
    }
  }

  app.innerHTML =
    '<div class="pick-screen">' +
      '<div class="pick-header">' +
        '<div class="logo">A</div><br>' +
        '<div class="brand">Ambria</div>' +
      '</div>' +
      '<div class="pick-search">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>' +
        '<input type="text" id="hub-search" placeholder="Search your name..." value="' + state.search + '">' +
      '</div>' +
      '<div class="pick-count">' + filtered.length + ' people</div>' +
      '<div class="pick-list">' + listHtml + '</div>' +
      '<div class="footer">Ambria <span>●</span> Hub</div>' +
    '</div>'

  var searchInput = document.getElementById('hub-search')
  searchInput.addEventListener('input', function (e) {
    state.search = e.target.value
    renderPicker()
    var el = document.getElementById('hub-search')
    if (el) { el.focus(); el.setSelectionRange(state.search.length, state.search.length) }
  })

  app.querySelectorAll('.pick-item').forEach(function (el) {
    el.addEventListener('click', function () {
      var idx = Number(el.dataset.idx)
      selectUser(filtered[idx])
    })
  })
}

function renderHub() {
  var u = state.user
  var cards = ''
  for (var i = 0; i < u.apps.length; i++) {
    var key = u.apps[i]
    var a = APPS[key]
    if (!a) continue
    cards +=
      '<a href="' + a.url + '" class="card ' + a.css + '">' +
        '<div class="card-icon">' + a.icon + '</div>' +
        '<div class="card-label">' + a.label + '</div>' +
        '<div class="card-desc">' + a.desc + '</div>' +
      '</a>'
  }

  app.innerHTML =
    '<div class="hub-screen">' +
      '<div class="hub-header">' +
        '<div class="hub-user">' +
          '<div class="avatar">' + u.name.charAt(0) + '</div>' +
          '<div>' +
            '<div class="hub-name">' + u.name + '</div>' +
            '<div class="hub-sub">Ambria</div>' +
          '</div>' +
        '</div>' +
        (u.is_admin ? '<button class="gear-btn" id="admin-btn">⚙ Admin</button> ' : '') +
        '<button class="logout-btn" id="logout">Switch</button>' +
      '</div>' +
      '<div class="cards">' + cards + '</div>' +
      '<div class="footer">Ambria <span>●</span> Hub</div>' +
    '</div>'

  document.getElementById('logout').addEventListener('click', logout)
  var adminBtn = document.getElementById('admin-btn')
  if (adminBtn) adminBtn.addEventListener('click', function () { loadAdminUsers() })
}

init()
</script>
</body>
</html>
